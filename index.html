<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>销售开单系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <h2 style="text-align:center">产品列表</h2>
  <div id="list"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxPNsGqFCjtP5RABzjrOD6kUQimGEvQK91bNmDtFgjGa8j7hSkv_0iXiSAWtLHxI0y6/exec?api=data";

    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        let html = "";
        data.forEach(item => {
          html += `
            <div style="padding:10px;border-bottom:1px solid #ccc">
              ${item.name} - R$ ${item.price}
            </div>
          `;
        });
        document.getElementById("list").innerHTML = html;
      });
  </script>
</body>
</html>
